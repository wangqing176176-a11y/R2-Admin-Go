<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>登陆注册页面</title>
    <link rel="stylesheet" href="./styles.css?v=20260501d" />
  </head>
  <body>
    <main class="page-shell">
      <header class="site-header" aria-label="网站导航">
        <a class="brand" href="#" aria-label="返回首页">
          <img class="brand-logo" src="/landing-page/new%20logo%201.png" alt="网站 Logo" />
        </a>

        <button class="nav-toggle" type="button" aria-label="打开导航菜单" aria-expanded="false" aria-controls="mainNav">
          <span></span>
          <span></span>
          <span></span>
        </button>

        <nav class="nav-tabs" id="mainNav" aria-label="主导航">
          <a class="nav-warning" href="#" title="严禁传输涉黄、侵权等违法违规数据、文件或媒体">
            <img class="nav-icon" src="https://api.iconify.design/lucide/megaphone.svg?color=%23dc2626" alt="" />
            <span class="warning-marquee"></span>
          </a>
          <a href="./404.html">
            <img class="nav-icon" src="https://api.iconify.design/lucide/layout-dashboard.svg?color=%23273249" alt="" />
            <span>功能</span>
          </a>
          <a href="https://qinghub.top/docs/r2-admin-go%E9%85%8D%E7%BD%AE%E8%AF%B4%E6%98%8E/" target="_blank" rel="noopener noreferrer">
            <img class="nav-icon" src="https://api.iconify.design/lucide/settings.svg?color=%23273249" alt="" />
            <span>配置</span>
          </a>
          <a href="mailto:wangqing176176@gmail.com">
            <img class="nav-icon" src="https://api.iconify.design/lucide/mail.svg?color=%23273249" alt="" />
            <span>联系</span>
          </a>
        </nav>
      </header>

      <div class="mobile-warning" title="严禁传输涉黄、侵权等违法违规数据、文件或媒体">
        <img class="nav-icon" src="https://api.iconify.design/lucide/megaphone.svg?color=%23dc2626" alt="" />
        <span class="warning-marquee"></span>
      </div>

      <section class="auth-panel" aria-label="登陆注册模块">
        <div class="auth-copy">
          <h1 id="panelTitle">欢迎使用</h1>
        </div>

        <form class="auth-form active" id="loginForm">
          <label class="field">
            <span>邮箱账号</span>
            <span class="input-shell">
              <span class="field-icon" aria-hidden="true">
                <img src="https://api.iconify.design/lucide/mail.svg?color=%23111417" alt="" />
              </span>
              <input type="email" name="loginEmail" placeholder="请输入邮箱账号" autocomplete="email" />
            </span>
          </label>

          <label class="field">
            <span>登陆密码</span>
            <span class="input-shell">
              <span class="field-icon" aria-hidden="true">
                <img src="https://api.iconify.design/lucide/lock-keyhole.svg?color=%23111417" alt="" />
              </span>
              <input type="password" name="loginPassword" placeholder="请输入登陆密码" autocomplete="current-password" />
              <button class="password-toggle" type="button" aria-label="显示密码">
                <img src="https://api.iconify.design/lucide/eye.svg?color=%237b8190" alt="" class="icon-show" />
                <img src="https://api.iconify.design/lucide/eye-off.svg?color=%237b8190" alt="" class="icon-hide" hidden />
              </button>
            </span>
          </label>

          <div class="form-row">
            <label class="checkbox-line">
              <input type="checkbox" name="remember" />
              <span>记住登陆状态</span>
            </label>
            <a class="text-link" href="#">忘记密码</a>
          </div>

          <p class="form-message" id="loginMessage" role="alert" hidden></p>

          <button class="primary-button" type="submit">登  陆</button>

          <p class="switch-line">
            还没有账号？
            <button class="mode-link" type="button" data-tab="register">立即注册</button>
          </p>
        </form>

        <form class="auth-form" id="registerForm">
          <label class="field">
            <span>邮箱账号</span>
            <span class="input-shell">
              <span class="field-icon" aria-hidden="true">
                <img src="https://api.iconify.design/lucide/mail.svg?color=%23111417" alt="" />
              </span>
              <input type="email" name="registerEmail" placeholder="请输入邮箱账号" autocomplete="email" />
            </span>
          </label>

          <label class="field">
            <span>登陆密码</span>
            <span class="input-shell">
              <span class="field-icon" aria-hidden="true">
                <img src="https://api.iconify.design/lucide/lock-keyhole.svg?color=%23111417" alt="" />
              </span>
              <input type="password" name="registerPassword" placeholder="请设置登陆密码" autocomplete="new-password" />
              <button class="password-toggle" type="button" aria-label="显示密码">
                <img src="https://api.iconify.design/lucide/eye.svg?color=%237b8190" alt="" class="icon-show" />
                <img src="https://api.iconify.design/lucide/eye-off.svg?color=%237b8190" alt="" class="icon-hide" hidden />
              </button>
            </span>
          </label>

          <label class="field">
            <span>邮箱验证码</span>
            <div class="input-shell code-field">
              <span class="field-icon" aria-hidden="true">
                <img src="https://api.iconify.design/lucide/hash.svg?color=%23111417" alt="" />
              </span>
              <input type="text" name="emailCode" placeholder="请输入验证码" inputmode="numeric" />
              <button class="code-button" type="button" id="sendCode">发送验证码</button>
            </div>
          </label>

          <label class="checkbox-line agreement">
            <input type="checkbox" name="agreement" id="agreementCheckbox" />
            <span>
              我已阅读并同意
              <a class="text-link" href="#" id="btnAllTerms">「本站全部条款」</a>
            </span>
          </label>

          <p class="form-message" id="registerMessage" role="alert" hidden></p>

          <button class="primary-button" type="submit">注  册</button>

          <p class="switch-line">
            已有账号？
            <button class="mode-link" type="button" data-tab="login">去登陆</button>
          </p>
        </form>
      </section>
    </main>

    <footer class="site-footer">© 2026 R2 Admin Go by Wang Qing. All rights reserved.</footer>

    <!-- 协议与政策弹窗 -->
    <div class="modal-overlay" id="termsModal" hidden>
      <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal-header">
          <h2 id="modalTitle">本站条款与协议</h2>
          <div class="modal-tabs" id="modalTabs">
            <button class="modal-tab active" type="button" data-target="userAgreement">用户协议</button>
            <button class="modal-tab" type="button" data-target="privacyPolicy">隐私政策</button>
            <button class="modal-tab" type="button" data-target="disclaimer">免责声明</button>
          </div>
        </div>
        <div class="modal-body" id="modalBody">
          <p>加载中...</p>
        </div>
        <div class="modal-footer">
          <button class="modal-btn" id="btnModalDisagree" type="button">不同意</button>
          <button class="modal-btn" id="btnModalAgree" type="button">我已阅读理解并同意全部条款</button>
        </div>
      </div>
    </div>

    <script src="./script.js?v=20260501e"></script>
  </body>
</html>
