              </span>

          <label class="field">

          <label class="field">

              <input type="text" name="emailCode" placeholder="请输入验证码" inputmode="numeric" />

          <label class="checkbox-line agreement">

            <span>
              我已阅读并同意

            </span>

          <p class="form-message" id="registerMessage" role="alert" hidden></p>

          <button class="primary-button" type="submit">注  册</button>

          <p class="switch-line">
            已有账号？
            <button class="mode-link" type="button" data-tab="login">去登陆</button>
